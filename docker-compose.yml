version: '3.9'

services:
  # ─────────────────────────────────────────
  # PostgreSQL — Primary Database
  # ─────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: ml_ecommerce_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ecommerce
      POSTGRES_USER: ${DB_USER:-ecom_user}
      POSTGRES_PASSWORD: ${DB_PASS:-ecom_pass_2024}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/prisma/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ecom_user} -d ecommerce"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Redis — Cache & Task Queue
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ml_ecommerce_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_pass_2024}
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_pass_2024}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # MongoDB — Event Logs & Analytics
  # ─────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: ml_ecommerce_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-mongo_user}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS:-mongo_pass_2024}
      MONGO_INITDB_DATABASE: ecommerce_events
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
      - ./ml-service/data/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # MLflow — Model Registry & Experiment Tracking
  # ─────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.10.0
    container_name: ml_ecommerce_mlflow
    restart: unless-stopped
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql://${DB_USER:-ecom_user}:${DB_PASS:-ecom_pass_2024}@postgres:5432/mlflow
      --default-artifact-root /mlflow/artifacts
    ports:
      - "5000:5000"
    volumes:
      - mlflowdata:/mlflow/artifacts
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MLFLOW_TRACKING_URI: http://localhost:5000

  # ─────────────────────────────────────────
  # Backend — Node.js Express API
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ml_ecommerce_backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://${DB_USER:-ecom_user}:${DB_PASS:-ecom_pass_2024}@postgres:5432/ecommerce
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_pass_2024}@redis:6379
      MONGODB_URI: mongodb://${MONGO_USER:-mongo_user}:${MONGO_PASS:-mongo_pass_2024}@mongodb:27017/ecommerce_events?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-super_secret_jwt_key_change_in_production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-super_secret_refresh_key_change_in_production}
      ML_SERVICE_URL: http://ml-service:8001
      FRONTEND_URL: http://localhost:3000
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy

  # ─────────────────────────────────────────
  # ML Service — FastAPI + Python
  # ─────────────────────────────────────────
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: ml_ecommerce_ml
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_pass_2024}
      DATABASE_URL: postgresql://${DB_USER:-ecom_user}:${DB_PASS:-ecom_pass_2024}@postgres:5432/ecommerce
      MONGODB_URI: mongodb://${MONGO_USER:-mongo_user}:${MONGO_PASS:-mongo_pass_2024}@mongodb:27017/ecommerce_events?authSource=admin
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MODEL_DIR: /app/models
    volumes:
      - ./ml-service:/app
      - ml_models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy

  # ─────────────────────────────────────────
  # Frontend — Next.js
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ml_ecommerce_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_ML_URL: http://localhost:8001
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend

  # ─────────────────────────────────────────
  # Prometheus — Metrics Collection
  # ─────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: ml_ecommerce_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheusdata:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'

  # ─────────────────────────────────────────
  # Grafana — Metrics Visualization
  # ─────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: ml_ecommerce_grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASS:-grafana_pass_2024}
    volumes:
      - grafanadata:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus

volumes:
  pgdata:
  redisdata:
  mongodata:
  mlflowdata:
  ml_models:
  prometheusdata:
  grafanadata:

networks:
  default:
    name: ml_ecommerce_network
